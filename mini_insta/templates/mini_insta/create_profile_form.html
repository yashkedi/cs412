<!-- Description: show the HTML form used to create a profile -->

<!-- Template path: mini_insta/templates/mini_insta/create_profile_form.html -->

{% extends 'mini_insta/base.html' %}

{% block content %}
<h1>Create Profile</h1>

<form action="" method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    
    <h2>User Account Info</h2>
    <table>
        {{ user_form.as_table }}
    </table>
    
    <h2>Profile Info</h2>
    <table>
        {{ form.as_table }}
    </table>

    <input type="submit" name="submit" value="Create Profile">
    <a href="{% url 'show_all_profiles' %}"><button type="button">Cancel</button></a>
</form>


{% endblock %}
